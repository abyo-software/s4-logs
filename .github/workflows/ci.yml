name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # s4-codec is a path dependency on ../s4 (P1 development layout —
      # root Cargo.toml). Clone the sibling so the workspace resolves; this
      # step goes away once s4-codec is published (P2).
      - name: Clone s4 sibling (s4-codec path dependency)
        run: git clone --depth 1 https://github.com/abyo-software/s4 ../s4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets
      - name: cargo test (PROPTEST_CASES=10000)
        env:
          PROPTEST_CASES: "10000"
        run: cargo test --workspace
      - name: Upload proptest-regressions artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: proptest-regressions-${{ github.run_id }}
          path: "**/*.proptest-regressions"
          if-no-files-found: ignore
