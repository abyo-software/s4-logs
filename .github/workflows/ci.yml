name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # s4-codec resolves as a git dependency (tag v1.0.0) — no sibling
      # clone needed since the P1 path-dep layout was retired.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets
      - name: cargo test (PROPTEST_CASES=10000)
        env:
          PROPTEST_CASES: "10000"
        run: cargo test --workspace
      # Fuzz smoke: the bolero targets already run under `cargo test
      # --workspace` (random engine), but an explicit step makes a fuzz
      # regression identifiable at a glance instead of buried in the
      # workspace test wall. Coverage-guided runs live in fuzz-nightly.yml.
      - name: fuzz targets smoke (bolero random engine)
        run: cargo test -p s4logs-core --test fuzz_bolero
      - name: Upload proptest-regressions artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: proptest-regressions-${{ github.run_id }}
          path: "**/*.proptest-regressions"
          if-no-files-found: ignore

  audit:
    name: supply-chain (deny + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # cargo-deny is the gate: advisories (with the documented rustls-webpki
      # 0.101.7 ignores in deny.toml), licenses, banned crates, and sources.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
