name: Release

# Tag v* → build a static linux binary, package tar.gz + sha256, create a
# GitHub release with the artifacts.
#
# Targets:
# - x86_64-unknown-linux-musl: static, native build (musl-tools + CC=musl-gcc
#   handles the zstd-sys C code; the AWS SDK uses rustls, so there is no
#   aws-lc-sys C to cross-compile here).
# - aarch64-unknown-linux-musl: built with `cross` (cross-rs) so the
#   aarch64 musl C toolchain lives in the cross container — verified to
#   compile (zstd-sys included) and qemu-smoke-tested (`s4logs --version`
#   → 0.3.0) on 2026-06-11. The historical blocker (aarch64 C cross-compile)
#   is resolved by delegating it to the cross image.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # create the release + upload assets

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # x86_64: native musl build. aarch64: `cross` carries its own aarch64
      # musl C toolchain in a container, so no host toolchain is installed.
      - name: Install musl toolchain (native x86_64 only)
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools
      - name: Install cross (aarch64 only)
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release -p s4logs-cli --bin s4logs --target ${{ matrix.target }}
      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release -p s4logs-cli --bin s4logs --target ${{ matrix.target }}
      - name: Package (tar.gz + sha256)
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BIN="target/${{ matrix.target }}/release/s4logs"
          # Binaries are already symbol-stripped by `[profile.release]
          # strip = "symbols"` — no external strip needed (GNU strip on the
          # host can't read the cross-built aarch64 ELF).
          STAGE="s4logs-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "$BIN" LICENSE NOTICE README.md "$STAGE/"
          tar czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
      - uses: actions/upload-artifact@v6
        with:
          name: s4logs-${{ matrix.target }}
          path: |
            s4logs-*.tar.gz
            s4logs-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: Create release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "s4logs ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
